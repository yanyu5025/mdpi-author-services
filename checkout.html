<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | MDPI Author Services</title>
    <link rel="stylesheet" href="fonts.css?v=20260716b" />
    <link rel="stylesheet" href="styles.css?v=20260716b" />
    <link rel="stylesheet" href="ux-enhance.css?v=20260716b" />
    <link rel="stylesheet" href="checkout.css?v=20260716k" />
  </head>
  <body class="checkout-page">
    <a href="#checkout-main" class="skip-link">Skip to checkout content</a>
    <header class="checkout-header">
      <div class="container checkout-header-inner">
        <a href="index.html" class="logo">
          <img
            class="logo-img"
            src="assets/mdpi-authors-services-logo.svg"
            alt="MDPI Author Services"
            width="125"
            height="32"
          />
        </a>
        <a href="index.html#quote" class="checkout-back-link">← Edit quote</a>
      </div>
    </header>

    <div class="checkout-progress-wrap">
      <div class="container">
        <ol class="checkout-progress" id="checkout-progress" aria-label="Checkout progress"></ol>
      </div>
    </div>

    <main class="checkout-main" id="checkout-main">
      <div class="container">
        <div class="checkout-card">
          <p>Loading checkout…</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <img
            class="logo-img"
            src="assets/mdpi-authors-services-logo.svg"
            alt="MDPI Author Services"
            width="125"
            height="32"
          />
        </div>
        <p class="footer-note">Prototype checkout — payment is simulated for demonstration.</p>
      </div>
    </footer>

    <script src="checkout.js?v=20260716m"></script>
  </body>
</html>
